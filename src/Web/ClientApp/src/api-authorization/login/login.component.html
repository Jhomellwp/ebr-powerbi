<div class="login-split">
  <div class="login-split__hero">
    <div class="login-split__hero-inner">
      <img
        class="login-split__logo"
        src="assets/img/abbott-logo-1.png"
        width="198"
        height="62"
        alt="Abbott"
      />
      <h1 class="login-split__welcome">Welcome</h1>
      <p class="login-split__org">Abbott Nutrition Research and Development</p>
      <p class="login-split__lede">
        Sign in to continue to EBR Power BI and your authorized workspaces.
      </p>
    </div>
  </div>

  <div class="login-split__panel">
    <div class="login-split__panel-inner">
      <h2 class="login-split__panel-title">Log in</h2>

      <form class="login-split__form" (ngSubmit)="login()" #loginForm="ngForm">
        <div class="login-field">
          <span class="login-field__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
          <label class="visually-hidden" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="login-field__input"
            placeholder="Email"
            [(ngModel)]="email"
            [attr.aria-invalid]="invalid ? true : null"
            aria-describedby="login-error"
            autocomplete="username"
            (ngModelChange)="invalid = false"
          />
        </div>

        <div class="login-field">
          <span class="login-field__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <label class="visually-hidden" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="login-field__input"
            placeholder="Password"
            [(ngModel)]="password"
            [attr.aria-invalid]="invalid ? true : null"
            aria-describedby="login-error"
            autocomplete="current-password"
            (ngModelChange)="invalid = false"
          />
        </div>

        @if (invalid) {
          <small id="login-error" class="login-split__error">Invalid email or password.</small>
        }

        <div class="login-split__row">
          <label class="login-split__remember">
            <input type="checkbox" name="remember" [(ngModel)]="rememberMe" />
            Remember me
          </label>
        </div>

        <button type="submit" class="login-split__submit">Log in</button>
      </form>
    </div>
  </div>
</div>
